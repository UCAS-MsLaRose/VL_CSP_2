<!DOCTYPE html>
<html lang="en">
    <head>
        <!--CSS stands for Cascading Style Sheets-->
        <title>Advanced Notes on HTML</title>
        <meta charset="UTF-8"/>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Pirata+One&display=swap" rel="stylesheet">
        <!--Embeded CSS goes inside of the head tags using the <style> tag-->
            <style>
                body{
                    background-color: rgba(139, 242, 128, 0.762);
                    font-family: "Pirata One", system-ui;
                    font-weight: 400;
                    font-style: normal;
                }
                
                #ordered-lists{
                    background-color: bisque;
                    color:chocolate;
                    margin-right: 10px;
                }
                .odd{
                    background-color: green;
                    color:white;
                }
                h1{
                    text-align: center;
                    color: 	#a36e3f90;
                    border: 2px solid yellow;
                    font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
                }
                img{
                    width: 50%;
                }
                #bolded{
                    font-weight: bolder;
                }
                #heading{
                    font-style: italic;
                    font-variant: small-caps;
                }
                #box{
                    background-color: blueviolet; 
                    height: 100px; 
                    width:100px;
                    text-align: center;
                    margin: 20px;
                    padding-top: 30px;
                }
                #box-wrapper{
                    display: flex;
                    justify-content: center;
                }
                p{
                    background-color: black;
                    color: aqua;
                    background-color: teal;
                    font-size: 1em; 
                }
                .lists-wrapper{
                    display: grid;
                    grid-template-columns: 1fr 1fr;
                }
                .images{
                    display:None;
                    margin: auto;
                    width: 50%;
                }
            </style>
            <script>
                function show(){
                    document.getElementById("clicking").innerHTML = "Hide Images"
                    document.getElementById("images").style.display = "block"
                }
            </script>
    </head>
    <body>
        <h1>HTML Advanced Notes</h1>
        <!--Inline styles are done in the HTML opening tag. This is bad practice to use!-->
        <div id="box-wrapper">
        <div id="box">
            <p>Div content</p>
        </div>
    </div>
    <div class="lists-wrapper">
        <div id="ordered-lists">
        <p id="heading">This is how you make an ordered (numbered) list</p>
        <ol>
            <li class="odd">Programming 2</li>
            <li>Programming 2</li>
            <li class="odd">Computer Science Principles</li>
            <li>Lunch</li>
        </ol>
    </div>
        <div id="unordered-lists">
        <p>This is how you create an <span id="bolded">unordered (bulleted)</span> list</p>
        <ul style="list-style-type:circle">
            <li class="odd">Apple</li>
            <li>Orange</li>
            <li class="odd">Banana</li>
            <li>Peach</li>
            <li class="odd">Grape</li>
        </ul>
        <a href="https://www.w3schools.com/tags/tag_ul.asp" target="_blank">W3schools Unordered lists</a>
    </div>
    </div>
    <button id="clicking" onclick="show()">Show images</button>
    <div class="images" id="images">
        <img src="https://ctfassets.ksldigital.com/0wjmk6wgfops/5JD8w0POZhQ3qrd67umb3x/20641b214beec98ee856a8b51b278947/1d4f485432_d05d7611-2084-4c25-ac90-807915184a65.jpg?q=70" alt="Mount Timpanogos in the fall"/>
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Mount_Timpanogos_-_01-07-08.jpg" alt="timp in the winter"/>
        </div>
    </body>
</html>
