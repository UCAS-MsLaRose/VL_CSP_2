<!DOCTYPE html>
<html lang="en">
    <head>
        <title>JavaScript Notes</title>
        <meta charset="UTF-8">
        <style>
            img{
                width: 50%
            }
            #img-wrapper{
                display: none;
            }
        </style>
        <script>
            function change_color(){
                document.getElementById("change").style.color = "orange"
            }
            function show_img(){
                if(document.getElementById("img-wrapper").style.display == "block"){
                    document.getElementById("img-wrapper").style.display = "none"
                    document.getElementById("show").innerHTML = "Show Image"
                }else{
                    document.getElementById("img-wrapper").style.display = "block"
                    document.getElementById("show").innerHTML = "Hide Image"
                }
                
            }
            function hover(id){
                document.getElementById(id).style.backgroundColor = "blue"
                document.getElementById(id).style.color = "white"
            }
            function leave(id){
                document.getElementById(id).style.backgroundColor = "grey"
                document.getElementById(id).style.color = "black"
            }
            function popup(){
                alert("You should be taking notes!")
            }
            let images = ["https://upload.wikimedia.org/wikipedia/commons/1/12/Mount_Timpanogos_-_01-07-08.jpg","https://www.earthdiver.com/cdn-cgi/image/width=4000,quality=75,format=auto/https://assets.earthdiver.com/media/media-2727684.jp?w=5246&h=2193&tick=1667491652923", "https://ctfassets.ksldigital.com/0wjmk6wgfops/5JD8w0POZhQ3qrd67umb3x/20641b214beec98ee856a8b51b278947/1d4f485432_d05d7611-2084-4c25-ac90-807915184a65.jpg?q=70"]
            //onclick onmousedown onmouseup onmouseenter-onmouseover onmouseleave-onmouseout
        </script>

    </head>
    <body>
        <h1 id="change" onmouseover="popup()">JavaScript Notes</h1>
        <button onclick="change_color()" onmouseover="hover('button')" id="button" onmouseout="leave('button')">Click me</button>
        <button onclick="show_img()" id="show" onmouseover="hover('show')" onmouseout="leave('show')">Show Image</button>
        <div id="img-wrapper">
            <img src="https://ctfassets.ksldigital.com/0wjmk6wgfops/5JD8w0POZhQ3qrd67umb3x/20641b214beec98ee856a8b51b278947/1d4f485432_d05d7611-2084-4c25-ac90-807915184a65.jpg?q=70" alt="Mount Timpanogos in the fall"/>
        </div>

    </body>
</html>
